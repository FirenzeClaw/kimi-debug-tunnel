<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kimi Debug Tunnel v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Consolas, monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #16213e;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #0f3460;
      flex-wrap: wrap;
    }
    header h1 { font-size: 16px; color: #e94560; }
    header .badge {
      font-size: 10px; padding: 2px 6px; border-radius: 3px;
      background: #0f3460; color: #8ab4f8;
    }
    header .status { font-size: 12px; }
    header .status .dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 4px;
    }
    .dot.green { background: #4caf50; }
    .dot.red { background: #f44336; }
    .dot.yellow { background: #ff9800; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 260px; min-width: 180px;
      background: #16213e; border-right: 1px solid #0f3460;
      overflow-y: auto; padding: 10px; font-size: 12px;
    }
    .sidebar h3 { font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; }
    .sidebar .info-row { margin-bottom: 6px; }
    .sidebar .info-row label { color: #888; display: block; font-size: 10px; }
    .sidebar .info-row span { color: #e0e0e0; }
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .msg {
      padding: 8px 12px; border-radius: 6px;
      max-width: 85%; font-size: 13px; line-height: 1.5;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.command { background: #0f3460; align-self: flex-start; }
    .msg.response { background: #1a3a1a; align-self: flex-end; }
    .msg.system { background: #333; align-self: center; font-size: 11px; color: #888; }
    .msg.error { background: #4a1a1a; color: #f88; align-self: center; font-size: 12px; }
    .msg.streaming { border-left: 2px solid #e94560; }
    .msg .time { font-size: 10px; color: #888; margin-bottom: 4px; }
    .msg .meta { font-size: 10px; color: #8ab4f8; margin-bottom: 4px; }
    .input-area {
      display: flex; padding: 10px; gap: 8px;
      border-top: 1px solid #0f3460; background: #16213e;
    }
    .input-area textarea {
      flex: 1; padding: 10px; border: 1px solid #0f3460;
      border-radius: 4px; background: #1a1a2e; color: #e0e0e0;
      font-size: 13px; outline: none; resize: vertical; min-height: 40px;
      font-family: inherit;
    }
    .input-area textarea:focus { border-color: #e94560; }
    .input-area button {
      padding: 10px 20px; background: #e94560; border: none;
      border-radius: 4px; color: white; cursor: pointer;
      font-size: 13px; font-weight: bold; align-self: flex-end;
    }
    .input-area button:hover { background: #d63851; }
    .input-area button:disabled { background: #555; cursor: not-allowed; }
    .input-area .toggle-row {
      display: flex; gap: 12px; align-items: center; margin-top: 4px;
    }
    .input-area .toggle-row label { font-size: 11px; color: #888; cursor: pointer; }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid #555; border-top-color: #e94560;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-right: 6px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>Kimi Debug Tunnel</h1>
    <span class="badge">v2</span>
    <span class="status">
      <span class="dot red" id="wsDot"></span>
      <span id="wsStatus">WS: --</span>
    </span>
    <span class="status">
      <span class="dot red" id="wireDot"></span>
      <span id="wireStatus">Wire: --</span>
    </span>
    <span style="margin-left:auto;font-size:11px;color:#666" id="clientId"></span>
  </header>
  <div class="main">
    <div class="sidebar" id="sidebar">
      <h3>连接状态</h3>
      <div class="info-row"><label>WebSocket</label><span id="siWs">未连接</span></div>
      <div class="info-row"><label>Wire (Kimi Web)</label><span id="siWire">未连接</span></div>
      <div class="info-row"><label>客户端数</label><span id="siClients">0</span></div>
      <div class="info-row"><label>队列积压</label><span id="siQueue">0</span></div>
      <h3 style="margin-top:16px">快捷键</h3>
      <div class="info-row"><label>Enter</label><span>发送</span></div>
      <div class="info-row"><label>Shift+Enter</label><span>换行</span></div>
    </div>
    <div class="content">
      <div class="messages" id="messages">
        <div class="msg system">Kimi Debug Tunnel v2 — 推送式实时通信已就绪</div>
      </div>
      <div class="input-area">
        <div style="flex:1;display:flex;flex-direction:column;">
          <textarea id="cmdInput" placeholder="输入指令 (Enter 发送, Shift+Enter 换行)..." rows="2"></textarea>
          <div class="toggle-row">
            <label><input type="checkbox" id="chkThinking"> 包含思考过程</label>
            <label><input type="checkbox" id="chkDirect" checked> 直接执行 (Wire)</label>
          </div>
        </div>
        <button id="sendBtn" onclick="sendCommand()">发送</button>
      </div>
    </div>
  </div>

  <script>
    const WS_URL = `ws://${location.host}/ws`;
    let ws, clientId;

    function connect() {
      ws = new WebSocket(WS_URL);
      ws.onopen = () => setWsStatus(true, 'Connected');
      ws.onclose = () => { setWsStatus(false, 'Disconnected'); setTimeout(connect, 3000); };
      ws.onerror = () => setWsStatus(false, 'Error');
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'system' && msg.clientId) {
            clientId = msg.clientId;
            document.getElementById('clientId').textContent = 'ID: ' + clientId.slice(0, 8);
            setWireStatus(msg.wireConnected, msg.wireConnected ? 'Connected' : 'Disconnected');
          }
          if (msg.type === 'response' || msg.type === 'error') {
            updateStreamingMessage(msg);
          } else {
            addMessage(msg);
          }
        } catch {}
      };
    }

    function setWsStatus(ok, text) {
      document.getElementById('wsDot').className = 'dot ' + (ok ? 'green' : 'red');
      document.getElementById('wsStatus').textContent = 'WS: ' + text;
      document.getElementById('siWs').textContent = text;
    }

    function setWireStatus(ok, text) {
      document.getElementById('wireDot').className = 'dot ' + (ok ? 'green' : 'red');
      document.getElementById('wireStatus').textContent = 'Wire: ' + text;
      document.getElementById('siWire').textContent = text;
    }

    let streamingMsgEl = null;
    function updateStreamingMessage(msg) {
      if (!streamingMsgEl) {
        streamingMsgEl = document.createElement('div');
        streamingMsgEl.className = 'msg response streaming';
        document.getElementById('messages').appendChild(streamingMsgEl);
      }
      const time = new Date().toLocaleTimeString();
      if (msg.type === 'error') {
        streamingMsgEl.className = 'msg error';
        streamingMsgEl.innerHTML = `<div class="time">${time}</div>${escapeHtml(msg.content)}`;
      } else {
        streamingMsgEl.innerHTML =
          `<div class="time">${time}</div>` +
          (msg.turnComplete !== undefined
            ? `<div class="meta">${msg.turnComplete ? '✅ 完成' : '⏳ 进行中'} | ${msg.finishReason || ''}</div>`
            : '') +
          `<div>${escapeHtml(msg.content || '')}</div>`;
        if (msg.turnComplete) {
          streamingMsgEl.className = 'msg response';
          streamingMsgEl = null;
        }
      }
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function addMessage(msg) {
      if (msg.type === 'response' || msg.type === 'error') {
        updateStreamingMessage(msg);
        return;
      }
      streamingMsgEl = null;
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg ' + (msg.type || 'system');
      div.innerHTML = `<div class="time">${new Date(msg.timestamp || Date.now()).toLocaleTimeString()}</div>${escapeHtml(msg.content || '')}`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    async function sendCommand() {
      const input = document.getElementById('cmdInput');
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      const direct = document.getElementById('chkDirect').checked;
      const thinking = document.getElementById('chkThinking').checked;

      // Show user message
      addMessage({ type: 'command', content: text, timestamp: new Date().toISOString() });

      // Show loading indicator
      if (direct) {
        streamingMsgEl = null;
        const container = document.getElementById('messages');
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'msg response streaming';
        loadingDiv.innerHTML = '<span class="spinner"></span> 处理中...';
        loadingDiv.id = 'loading-' + Date.now();
        container.appendChild(loadingDiv);
        container.scrollTop = container.scrollHeight;
      }

      ws.send(JSON.stringify({
        type: 'command',
        content: text,
        execute_direct: direct,
        include_thinking: thinking,
      }));
      input.value = '';
      input.style.height = 'auto';
    }

    function escapeHtml(text) {
      const el = document.createElement('span');
      el.textContent = text;
      return el.innerHTML;
    }

    // Shift+Enter for newline, Enter to send
    document.getElementById('cmdInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendCommand();
      }
    });

    // Poll status
    setInterval(async () => {
      try {
        const res = await fetch('/api/status');
        const status = await res.json();
        document.getElementById('siClients').textContent = status.clientCount;
        document.getElementById('siQueue').textContent = status.incomingQueueLength;
        setWireStatus(status.wireConnected, status.wireConnected ? 'Connected' : 'Disconnected');
      } catch {}
    }, 3000);

    connect();
  </script>
</body>
</html>

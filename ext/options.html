<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Kimi Session Orchestrator — 设置</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 400px; margin: 40px auto; padding: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; }
    input { width: 100%; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { margin-top: 12px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
    .status { margin-top: 8px; font-size: 13px; color: #3fb950; }
  </style>
</head>
<body>
  <h1>Orchestrator 设置</h1>
  <label for="port">Tunnel 端口</label>
  <input type="number" id="port" min="1" max="65535" value="3456">
  <button id="saveBtn">保存</button>
  <div class="status" id="status"></div>
  <script src="options.js"></script>
</body>
</html>
